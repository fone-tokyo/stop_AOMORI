<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>stop_AOMORI 4人対戦</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#0a0a18;display:flex;align-items:flex-start;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif}
:root{
  --p1:#7FFFD4;--p1d:#2a7a62;--p2:#87CEEB;--p2d:#2a6a85;
  --p3:#FFB347;--p3d:#8a5a15;--p4:#DDA0DD;--p4d:#7a3e7a;
  --bg:#0f0f1e;--txt:#e8e8f0;--txt2:#9090b0;--brd:#333355;--brd2:#444466
}
#app{width:375px;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;position:relative;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 7px;background:var(--bg);border-bottom:0.5px solid var(--brd);flex-shrink:0}
.topbar-title{font-size:13px;font-weight:500;color:var(--txt)}
.topbar-info{font-size:11px;color:var(--txt2)}
.turn-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;margin-left:6px}
.p3-area{background:#1e1a10;border-bottom:0.5px solid var(--brd);padding:6px 10px;flex-shrink:0;display:flex;flex-direction:column;align-items:center}
.p3-label{font-size:10px;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.p-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.card-mini{width:26px;height:36px;border-radius:4px;background:#3a3060;border:0.5px solid #534AB7;color:#9988ff;display:inline-flex;align-items:center;justify-content:center;font-size:14px;margin-right:-8px;flex-shrink:0}
.card-mini:last-child{margin-right:0}
.main-area{display:flex;flex:1;min-height:0}
.p2-area{width:38px;background:#101825;border-right:0.5px solid var(--brd);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 3px;gap:4px;flex-shrink:0}
.p4-area{width:38px;background:#1e1018;border-left:0.5px solid var(--brd);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 3px;gap:4px;flex-shrink:0}
.p-vert-name{font-size:9px;font-weight:500;writing-mode:vertical-rl;text-orientation:mixed;letter-spacing:1px;line-height:1}
.p-vert-count{font-size:9px;color:var(--txt2);writing-mode:vertical-rl;text-orientation:upright;letter-spacing:2px;line-height:1}
.p-vert-sep{width:20px;height:0.5px;background:var(--brd);margin:2px 0}
.card-vert{width:28px;height:20px;border-radius:3px;background:#1a2535;border:0.5px solid #335;display:flex;align-items:center;justify-content:center;font-size:10px;margin:1px 0}
.center-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.field-seq-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;background:#111122;padding:5px 6px;border-bottom:0.5px solid var(--brd)}
.field-label{font-size:9px;color:var(--txt2);margin-bottom:4px}
.seq-row{display:flex;align-items:center;gap:2px;margin-bottom:2px}
.seq-row:last-child{margin-bottom:0}
.suit-lbl{font-size:8px;width:12px;flex-shrink:0}
.seq-slot{width:20px;height:28px;border-radius:3px;border:0.5px solid #333;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:500}
.seq-slot.empty{background:#0a0a18;color:#333}
.seq-slot.on{background:#1e2e1e;border-color:#2a5a2a;color:#7fd47f}
.seq-slot.on.red{background:#2e1e1e;border-color:#5a2a2a;color:#f08080}
.pile-area{display:flex;align-items:center;justify-content:center;gap:30px;padding:8px 6px;background:#0d0d1c;border-top:0.5px solid var(--brd);border-bottom:0.5px solid var(--brd);flex-shrink:0}
.pile-wrap{display:flex;flex-direction:column;align-items:center;gap:3px}
.pile-lbl{font-size:9px;color:var(--txt2)}
.pile-card{width:64px;height:90px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:500;cursor:pointer}
.pile-card.deck{background:#3a3060;border:1.5px solid #534AB7;color:#9988ff;font-size:26px}
.pile-card.disc{background:#1e2e1e;border:2px solid var(--p1)}
.pile-card .p-suit{font-size:22px;line-height:1.2}
.pile-card .p-num{font-size:15px;line-height:1;color:var(--txt)}
.pile-cnt{font-size:9px;color:var(--txt2)}
.pile-arrow{font-size:16px;color:#444;margin-top:22px}
.disc-glow-p1{animation:gp1 2s ease-in-out infinite}
.disc-glow-p2{animation:gp2 2s ease-in-out infinite}
.disc-glow-p3{animation:gp3 2s ease-in-out infinite}
.disc-glow-p4{animation:gp4 2s ease-in-out infinite}
@keyframes gp1{0%,100%{box-shadow:0 0 3px rgba(127,255,212,.3)}50%{box-shadow:0 0 14px rgba(127,255,212,.8)}}
@keyframes gp2{0%,100%{box-shadow:0 0 3px rgba(135,206,235,.3)}50%{box-shadow:0 0 14px rgba(135,206,235,.8)}}
@keyframes gp3{0%,100%{box-shadow:0 0 3px rgba(255,179,71,.3)}50%{box-shadow:0 0 14px rgba(255,179,71,.8)}}
@keyframes gp4{0%,100%{box-shadow:0 0 3px rgba(221,160,221,.3)}50%{box-shadow:0 0 14px rgba(221,160,221,.8)}}
.field-same-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;background:#111122;padding:5px 6px}
.same-groups{display:flex;gap:5px;flex-wrap:wrap}
.same-group{background:#1a1a30;border:0.5px solid #334;border-radius:5px;padding:3px 5px}
.same-group-lbl{font-size:8px;color:var(--txt2);margin-bottom:2px}
.same-cards{display:flex;gap:2px}
.same-card{width:22px;height:30px;border-radius:3px;border:0.5px solid #444;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:500;background:#1e1e30}
.same-card.jk{background:#2a2050;border-color:#7F77DD;color:#9988ff}
.same-card.red{color:#f08080}
.same-card.blk{color:#e0e0e0}
.stop-btn.hidden,.act-bar.hidden,.modal-bg.hidden,.setup-scr.hidden{display:none}
.wait-msg{font-size:11px;color:var(--txt2);text-align:center;padding:4px 0 2px;flex-shrink:0;min-height:22px}
.act-bar{display:flex;gap:6px;padding:4px 8px;flex-shrink:0;background:#0a0a14;border-top:0.5px solid var(--brd)}
.act-btn{flex:1;padding:8px 4px;border-radius:7px;border:none;font-size:12px;font-weight:500;cursor:pointer}
.act-btn.play{background:#1D9E75;color:white}
.act-btn.discard{background:#252540;color:var(--txt2);border:0.5px solid var(--brd2)}
.p1-area{background:#101e18;border-top:0.5px solid var(--brd);padding:6px 8px 10px;flex-shrink:0}
.p1-info{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.p1-stats{font-size:10px;color:var(--txt2)}
.p1-hand{display:flex;align-items:flex-end}
.hand-slots{display:flex;gap:2px}
.hand-card{width:36px;height:52px;border-radius:5px;background:#1e2e28;border:1px solid var(--p1);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0;cursor:pointer;transition:transform .12s;user-select:none}
.hand-card .h-suit{font-size:13px;line-height:1.2}
.hand-card .h-num{font-size:10px;line-height:1.2}
.hand-card.red{color:#f08080}
.hand-card.blk{color:#c8d8d0}
.hand-card.jok{background:#2a2050;border-color:#7F77DD;color:#9988ff}
.hand-card.sel{transform:translateY(-7px);border:2px solid #fff;box-shadow:0 0 10px rgba(127,255,212,.5)}
.draw-sep{width:8px;flex-shrink:0}
.draw-card{width:36px;height:52px;border-radius:5px;background:#3a3060;border:1.5px solid #534AB7;color:#9988ff;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;font-size:22px}
.stop-btn{position:absolute;bottom:76px;right:12px;width:52px;height:52px;border-radius:50%;background:#D85A30;border:2px solid #993C1D;color:white;font-size:10px;font-weight:500;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(216,90,48,.4)}
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100}
.modal-box{background:#1a1a2e;border:0.5px solid var(--brd2);border-radius:12px;padding:18px;width:100%}
.modal-title{font-size:15px;font-weight:500;color:var(--txt);margin-bottom:6px}
.modal-sub{font-size:11px;color:var(--txt2);margin-bottom:10px}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.modal-btn{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none}
.modal-btn.cancel{background:#252540;color:var(--txt2)}
.modal-btn.go{background:#D85A30;color:white}
.score-row{display:flex;justify-content:space-between;font-size:13px;color:var(--txt);padding:5px 0;border-bottom:0.5px solid var(--brd)}
.setup-scr{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:200}
.setup-title{font-size:22px;font-weight:500;color:var(--txt);margin-bottom:4px}
.setup-sub{font-size:12px;color:var(--txt2);margin-bottom:24px}
.setup-input{width:100%;padding:10px 12px;border-radius:8px;border:0.5px solid var(--brd2);background:#1a1a2e;color:var(--txt);font-size:14px;margin-bottom:10px}
.setup-num-btn{flex:1;padding:10px;border-radius:8px;border:1px solid var(--brd2);background:#1a1a2e;color:var(--txt2);font-size:14px;font-weight:500;cursor:pointer}
.setup-num-btn.active{background:var(--p1);color:var(--p1d);border-color:var(--p1)}
.setup-btn{width:100%;padding:12px;border-radius:8px;border:none;background:var(--p1);color:var(--p1d);font-size:14px;font-weight:500;cursor:pointer}
</style>
</head>
<body>
<div id="app">
  <div class="setup-scr" id="setup-scr">
    <div class="setup-title">stop_AOMORI</div>
    <div class="setup-sub">4人オンライン対戦</div>

    <!-- 名前入力 -->
    <input class="setup-input" id="inp-name" placeholder="あなたの名前" value="トモカ">

    <!-- ホストエリア -->
    <div id="host-area">
      <div style="font-size:11px;color:var(--txt2);margin-bottom:8px;text-align:center">ルームを作る</div>
      <div style="display:flex;gap:8px;margin-bottom:12px;width:100%">
        <button class="setup-num-btn" id="num-2" onclick="setNumPlayers(2)">2人</button>
        <button class="setup-num-btn active" id="num-3" onclick="setNumPlayers(3)">3人</button>
        <button class="setup-num-btn" id="num-4" onclick="setNumPlayers(4)">4人</button>
      </div>
      <button class="setup-btn" onclick="createRoom()">ルームを作る</button>
    </div>

    <div style="display:flex;align-items:center;gap:8px;margin:12px 0">
      <div style="flex:1;height:0.5px;background:var(--brd)"></div>
      <div style="font-size:11px;color:var(--txt2)">or</div>
      <div style="flex:1;height:0.5px;background:var(--brd)"></div>
    </div>

    <!-- 参加エリア -->
    <div id="join-area">
      <div style="font-size:11px;color:var(--txt2);margin-bottom:8px;text-align:center">ルームに参加</div>
      <input class="setup-input" id="inp-room" placeholder="ルームコード（4桁）" maxlength="4"
        style="text-align:center;font-size:20px;letter-spacing:8px;font-weight:500">
      <button class="setup-btn" style="background:var(--p2);color:var(--p2d)" onclick="joinRoom()">参加する</button>
    </div>

    <!-- 接続状態 -->
    <div id="connecting-area" style="display:none;text-align:center;padding:20px 0">
      <div style="font-size:13px;color:var(--txt2)" id="connect-msg">接続中…</div>
    </div>

    <!-- ルーム待機画面 -->
    <div id="waiting-area" style="display:none">
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:11px;color:var(--txt2);margin-bottom:6px">ルームコード</div>
        <div style="font-size:36px;font-weight:500;color:var(--p1);letter-spacing:8px" id="room-code-display">----</div>
        <div style="font-size:11px;color:var(--txt2);margin-top:4px">LINEで友達に共有してください</div>
      </div>
      <div id="player-list" style="margin-bottom:16px"></div>
      <button class="setup-btn" id="start-btn" onclick="hostStartGame()" style="display:none">ゲーム開始！</button>
      <div style="font-size:11px;color:var(--txt2);text-align:center" id="wait-players-msg">全員の参加を待っています…</div>
    </div>
  </div>
  <div class="topbar">
    <div class="topbar-title">stop_AOMORI <span class="turn-badge" id="turn-badge"></span></div>
    <div class="topbar-info" id="round-info">R1/10</div>
  </div>
  <div class="p3-area">
    <div class="p3-label">
      <span class="p-dot" style="background:var(--p3)"></span>
      <span id="p3-name-lbl">-</span>&nbsp;<span id="p3-count-lbl">-</span>
    </div>
    <div id="p3-cards" style="display:flex"></div>
  </div>
  <div class="main-area">
    <div class="p2-area">
      <div class="p-vert-name" style="color:var(--p2)" id="p2-name-lbl">-</div>
      <div class="p-vert-sep"></div>
      <div class="p-vert-count" id="p2-count-lbl">-</div>
      <div class="p-vert-sep"></div>
      <div id="p2-cards"></div>
    </div>
    <div class="center-area">
      <div class="field-seq-wrap">
        <div class="field-label">連番</div>
        <div class="seq-row" id="seq-spade"><div class="suit-lbl" style="color:#c8c8c8">♠</div></div>
        <div class="seq-row" id="seq-heart"><div class="suit-lbl" style="color:#f08080">♥</div></div>
        <div class="seq-row" id="seq-diamond"><div class="suit-lbl" style="color:#f08080">♦</div></div>
        <div class="seq-row" id="seq-club"><div class="suit-lbl" style="color:#c8c8c8">♣</div></div>
      </div>
      <div class="pile-area">
        <div class="pile-wrap">
          <div class="pile-lbl">山札</div>
          <div class="pile-card deck" id="deck-card" onclick="drawDeck()">🂠</div>
          <div class="pile-cnt" id="deck-cnt">-</div>
        </div>
        <div class="pile-arrow">→</div>
        <div class="pile-wrap">
          <div class="pile-lbl">捨て札</div>
          <div class="pile-card disc" id="disc-card" onclick="drawDisc()"></div>
          <div class="pile-cnt" id="disc-cnt">-</div>
        </div>
      </div>
      <div class="field-same-wrap">
        <div class="field-label">同番</div>
        <div class="same-groups" id="same-groups"></div>
      </div>
    </div>
    <div class="p4-area">
      <div class="p-vert-name" style="color:var(--p4)" id="p4-name-lbl">-</div>
      <div class="p-vert-sep"></div>
      <div class="p-vert-count" id="p4-count-lbl">-</div>
      <div class="p-vert-sep"></div>
      <div id="p4-cards"></div>
    </div>
  </div>

  <div class="wait-msg" id="wait-msg"></div>
  <div class="act-bar hidden" id="act-bar"></div>
  <div class="p1-area">
    <div class="p1-info">
      <div id="p1-name-lbl" style="font-size:11px;font-weight:500;color:var(--p1)">-</div>
      <div class="p1-stats" id="p1-stats">-</div>
    </div>
    <div class="p1-hand">
      <div class="hand-slots" id="p1-hand"></div>
      <div class="draw-sep"></div>
      <div class="draw-card" id="draw-card" onclick="drawDeck()">🂠</div>
    </div>
  </div>
  <div class="stop-btn hidden" id="stop-btn" onclick="openStopModal()">STOP</div>
  <div class="modal-bg hidden" id="stop-modal">
    <div class="modal-box">
      <div class="modal-title">🛑 ストップ宣言</div>
      <div class="modal-sub">手札合計を確認してください</div>
      <div id="stop-modal-body"></div>
      <div class="modal-btns">
        <button class="modal-btn cancel" onclick="closeStopModal()">キャンセル</button>
        <button class="modal-btn go" onclick="declareStop()">宣言！</button>
      </div>
    </div>
  </div>
  <div class="modal-bg hidden" id="result-modal">
    <div class="modal-box">
      <div class="modal-title" id="result-title"></div>
      <div id="result-body"></div>
      <div class="modal-btns">
        <button class="modal-btn go" id="result-next-btn" onclick="nextRound()">次のラウンドへ</button>
      </div>
    </div>
  </div>
  <div class="modal-bg hidden" id="end-modal">
    <div class="modal-box">
      <div class="modal-title">🏆 ゲーム終了</div>
      <div id="end-body"></div>
      <div class="modal-btns">
        <button class="modal-btn go" onclick="resetGame()">もう一度</button>
      </div>
    </div>
  </div>
  <!-- 親決めモーダル -->
  <div class="modal-bg hidden" id="parent-draw-modal">
    <div class="modal-box">
      <div class="modal-title">&#127183; 親決め</div>
      <div class="modal-sub" style="margin-bottom:12px">カードを引いて一番強い人が親<br><small style="color:var(--txt2)">強さ: A &lt; 2 ... K &lt; JK</small></div>
      <div id="parent-draw-cards" style="display:flex;justify-content:center;gap:10px;margin:14px 0;flex-wrap:wrap"></div>
      <div id="parent-draw-result" style="text-align:center;font-size:14px;color:var(--p1);min-height:20px;font-weight:500;margin-bottom:8px"></div>
      <div class="modal-btns hidden" id="parent-draw-btn-area">
        <button class="modal-btn go" onclick="startNextRoundAfterDraw()">次のラウンドへ</button>
      </div>
    </div>
  </div>
</div>
<script>
var SP='\u2660',HT='\u2665',DM='\u2666',CL='\u2663';
var SUITS=[SP,HT,DM,CL];
var SC={};SC[SP]='blk';SC[HT]='red';SC[DM]='red';SC[CL]='blk';
var SID={};SID[SP]='spade';SID[HT]='heart';SID[DM]='diamond';SID[CL]='club';
var VN={1:'A',11:'J',12:'Q',13:'K'};
var PCSS=['var(--p1)','var(--p2)','var(--p3)','var(--p4)'];
var PCD=['var(--p1d)','var(--p2d)','var(--p3d)','var(--p4d)'];
var G=null;
var LAST_ROUND_TYPE=null;
var LAST_WINNER_IDX=-1;
var LAST_STOPPER_IDX=-1;
var PARENT_DRAW_CARDS={};
var PARENT_DRAW_SEED=0;
var PARENT_DRAW_ALL={};

function vn(v){return VN[v]||String(v)}
function cl(c){return c.joker?'JK':c.suit+vn(c.val)}

function makeDeck(){
  var d=[];
  SUITS.forEach(function(s){for(var v=1;v<=13;v++)d.push({suit:s,val:v,id:s+v,joker:false});});
  d.push({joker:true,id:'JK1'});d.push({joker:true,id:'JK2'});return d;
}
function sfl(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function hsum(h){return h.reduce(function(s,c){return s+(c.joker?0:c.val);},0)}
function hsumStop(h,isStopper){return h.reduce(function(s,c){return s+(c.joker?(isStopper?1:0):c.val);},0)}

var NUM_PLAYERS=3;

/* ===== Ably設定 ===== */
var ABLY_KEY='xwpn-w.13nazw:6pVOjzDkvR3OxWFolAgiFH7XnkpaxUIw1gXGX7j3hjE';
var ably=null;
var channel=null;
var MY_NAME='';
var MY_IDX=-1;  /* 0=P1,1=P2,2=P3,3=P4 */
var IS_HOST=false;
var ROOM_CODE='';
var PLAYERS=[];  /* [{name,idx,connected}] */

/* ===== ルーム作成 ===== */
function createRoom(){
  MY_NAME=document.getElementById('inp-name').value||'プレイヤー1';
  NUM_PLAYERS=[2,3,4].find(function(n){return document.getElementById('num-'+n).classList.contains('active');})||3;
  IS_HOST=true;
  MY_IDX=0;
  /* 4桁ランダムコード生成 */
  ROOM_CODE=String(Math.floor(1000+Math.random()*9000));
  document.getElementById('room-code-display').textContent=ROOM_CODE;
  showConnecting('ルームを作成中…');
  connectAbly(function(){
    joinChannel(ROOM_CODE);
  });
}

/* ===== ルーム参加 ===== */
function joinRoom(){
  MY_NAME=document.getElementById('inp-name').value||'プレイヤー';
  ROOM_CODE=document.getElementById('inp-room').value.trim();
  if(ROOM_CODE.length!==4){setConnectMsg('ルームコードは4桁で入力してください。');return;}
  IS_HOST=false;
  showConnecting('ルームに入室中…');
  connectAbly(function(){
    joinChannel(ROOM_CODE);
  });
}

/* ===== Ably接続 ===== */
function connectAbly(cb){
  ably=new Ably.Realtime({key:ABLY_KEY,clientId:MY_NAME+'_'+Date.now()});
  ably.connection.on('connected',function(){
    setConnectMsg('Ably接続成功！');
    cb();
  });
  ably.connection.on('failed',function(){
    setConnectMsg('接続失敗。再読み込みしてください。');
  });
}

/* ===== チャンネル参加 ===== */
function joinChannel(code){
  channel=ably.channels.get('stop-aomori-'+code);
  /* メッセージ受信 */
  channel.subscribe(function(msg){
    handleMsg(msg.name, msg.data, msg.timestamp);
  });
  /* プレゼンス（入室通知） */
  channel.presence.subscribe('enter',function(m){
    onPlayerEnter(m.clientId,m.data);
  });
  channel.presence.subscribe('leave',function(m){
    onPlayerLeave(m.clientId);
  });
  /* 自分が入室 */
  channel.presence.enter({name:MY_NAME,isHost:IS_HOST,numPlayers:NUM_PLAYERS});
  /* 待機画面へ */
  showWaiting();
}

/* ===== プレイヤー入退室 ===== */
function onPlayerEnter(clientId, data){
  /* 既存チェック */
  if(PLAYERS.find(function(p){return p.clientId===clientId;}))return;
  var idx=PLAYERS.length;
  PLAYERS.push({clientId:clientId,name:data.name,idx:idx,connected:true});
  if(IS_HOST){
    broadcastPlayerList();
  }
  updateWaitingUI();
}
function onPlayerLeave(clientId){
  var p=PLAYERS.find(function(p){return p.clientId===clientId;});
  if(p)p.connected=false;
  updateWaitingUI();
}

/* ===== プレイヤーリスト配信（ホストのみ） ===== */
function broadcastPlayerList(){
  sendMsg('player_list',{players:PLAYERS,numPlayers:NUM_PLAYERS});
}

/* ===== ホストがゲーム開始 ===== */
function hostStartGame(){
  if(!IS_HOST)return;
  var seed=Math.floor(Math.random()*1000000);
  /* 全員にゲーム開始を通知（同じseed） */
  sendMsg('game_start',{players:PLAYERS,numPlayers:NUM_PLAYERS,seed:seed});
  /* 自分も同じseedで開始 */
  initGame(PLAYERS,NUM_PLAYERS,seed);
}

/* ===== メッセージ送信 ===== */
function sendMsg(name,data){
  if(channel)channel.publish(name,data);
}

/* ===== メッセージ受信ハンドラ ===== */
function handleMsg(name,data,timestamp){
  if(name==='player_list'){
    PLAYERS=data.players;
    NUM_PLAYERS=data.numPlayers;
    /* 自分のインデックスを探す */
    var me=PLAYERS.find(function(p){return p.name===MY_NAME;});
    if(me)MY_IDX=me.idx;
    updateWaitingUI();
  }
  else if(name==='game_start'){
    PLAYERS=data.players;
    NUM_PLAYERS=data.numPlayers;
    /* 自分のインデックスを名前で特定 */
    for(var i=0;i<PLAYERS.length;i++){
      if(PLAYERS[i].name===MY_NAME){MY_IDX=i;break;}
    }
    /* ホストはMY_IDX=0なのでゲーム開始メッセージを自分でも処理 */
    initGame(data.players,data.numPlayers,data.seed);
  }
  else if(name==='action'){
    if(G&&data.playerIdx!==MY_IDX){
      applyRemoteAction(data, timestamp);
    }
  }
  else if(name==='game_state'){
    if(data.playerIdx!==MY_IDX){
      applyGameState(data);
    }
  }
  else if(name==='parent_draw_start'){
    PARENT_DRAW_SEED=data.seed;PARENT_DRAW_CARDS={};
    PARENT_DRAW_ALL=data.allCards||{};
    document.getElementById('parent-draw-modal').classList.remove('hidden');
    var rEl=document.getElementById('parent-draw-result');if(rEl)rEl.textContent='';
    var bEl=document.getElementById('parent-draw-btn-area');if(bEl)bEl.classList.add('hidden');
    renderParentDrawCards();
  }
  else if(name==='parent_draw_card'){
    PARENT_DRAW_CARDS[data.playerIdx]=data.card;
    checkParentDrawDone();
  }
  else if(name==='next_round'){
    G.round=data.round;
    G.parent=data.parent;
    G.cur=data.parent;
    dealRoundWithSeed(data.seed);
  }
  else if(name==='round_result'){
    applyRoundResult(data);
  }

}

/* ===== ゲーム初期化（全員共通） ===== */
function initGame(players,numPlayers,seed){
  document.getElementById('setup-scr').classList.add('hidden');
  /* シード付きデッキ生成（全員同じ手札に） */
  var seededDeck=seededShuffle(makeDeck(),seed);
  /* players配列はホストから渡る [{name,idx,...}] */
  /* 4人分のスロットを用意してアクティブなものだけ埋める */
  var names=[
    {name:'',hand:[],score:0,idx:0,active:false},
    {name:'',hand:[],score:0,idx:1,active:false},
    {name:'',hand:[],score:0,idx:2,active:false},
    {name:'',hand:[],score:0,idx:3,active:false}
  ];
  players.forEach(function(p,i){
    if(i<4){
      names[i].name=p.name||'P'+(i+1);
      names[i].active=i<numPlayers;
    }
  });
  G={ps:names,
     deck:seededDeck,disc:[],seqField:{},sameField:[],
     cur:0,parent:0,round:1,maxR:10,phase:'draw',sel:[],
     drawnCard:null,flowMul:1,firstDiscard:false,ti:0,
     numPlayers:numPlayers};
  G.activePsIdx=G.ps.reduce(function(arr,p,i){if(p.active)arr.push(i);return arr;},[]);
  G.curActivePos=0;G.cur=G.activePsIdx[0];G.parent=G.activePsIdx[0];
  applyLayout(numPlayers);
  renderAll();
  /* 最初は親汾めからスタート */
  if(IS_HOST){
    startParentDraw();
  } else {
    /* 参加者は parent_draw_start メッセージを待つ */
    setMsg('親汾め中…');
  }
}

/* ===== シード付きシャッフル（全員同じデッキに） ===== */
function seededShuffle(arr,seed){
  var a=arr.slice();
  var s=seed;
  function rand(){s=(s*9301+49297)%233280;return s/233280;}
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(rand()*(i+1));
    var t=a[i];a[i]=a[j];a[j]=t;
  }
  return a;
}

/* ===== ゲーム状態を全員に送信 ===== */
function broadcastGameState(){
  /* G全体をシリアライズして送信 */
  var state={
    ps:G.ps.map(function(p){return{name:p.name,score:p.score,idx:p.idx,active:p.active,handCount:p.hand.length};}),
    disc:G.disc,
    seqField:G.seqField,
    sameField:G.sameField,
    cur:G.cur,parent:G.parent,round:G.round,
    flowMul:G.flowMul,firstDiscard:G.firstDiscard,ti:G.ti,
    phase:G.phase,
    /* 自分の手札は送らない（他プレイヤーには見えないから） */
    myHand:G.ps[MY_IDX]?G.ps[MY_IDX].hand:[],
    playerIdx:MY_IDX,
    deckCount:G.deck.length
  };
  sendMsg('game_state',state);
}

/* ===== アクション送信 ===== */
function sendAction(type,data){
  data=data||{};
  data.playerIdx=MY_IDX;
  data.type=type;
  sendMsg('action',data);
}

/* ===== ラウンド結果を受信して反映 ===== */
function applyRoundResult(data){
  if(!G)return;
  data.scores.forEach(function(s){
    if(G.ps[s.idx])G.ps[s.idx].score=s.score;
  });
  G.flowMul=data.flowMul||1;
  if(data.nextParent!==undefined)G.parent=data.nextParent;
  /* 次のラウンドで使うためLAST_ROUND_TYPEを必ず設定 */
  LAST_ROUND_TYPE=data.type;
  LAST_WINNER_IDX=data.winnerIdx!=null?data.winnerIdx:-1;
  LAST_STOPPER_IDX=data.stopperIdx!=null?data.stopperIdx:-1;
  var winner=data.winnerIdx!=null?G.ps[data.winnerIdx]:null;
  showRoundResult(data.type,data.mul,winner);
}

/* ===== ゲーム状態を受信して反映 ===== */
function applyGameState(state){
  if(!G)return;
  /* 他プレイヤーの手札枚数を更新 */
  state.ps.forEach(function(sp){
    if(sp.idx!==MY_IDX&&G.ps[sp.idx]){
      /* 手札枚数に合わせて裏向きカードを調整 */
      var p=G.ps[sp.idx];
      p.score=sp.score;
      /* 手札枚数を合わせる（裏向きカードで調整） */
      while(p.hand.length<sp.handCount){
        p.hand.push({suit:'?',val:0,id:'back_'+Math.random(),joker:false,back:true});
      }
      while(p.hand.length>sp.handCount){p.hand.pop();}
    }
  });
  /* 捨て札を同期 */
  G.disc=state.disc;
  /* 場の状態を同期 */
  G.seqField=state.seqField;
  G.sameField=state.sameField;
  /* ゲーム進行状態を同期 */
  G.cur=state.cur;
  G.curActivePos=G.activePsIdx.indexOf(state.cur);
  G.round=state.round;
  G.flowMul=state.flowMul;
  G.firstDiscard=state.firstDiscard;
  G.ti=state.ti;
  G.phase=state.phase;
  G.sel=[];
  /* drawnCard は自分のターン中は保持する（null にしない） */
  if(G.cur!==MY_IDX) G.drawnCard=null;
  renderAll();

  if(G.cur===MY_IDX){
    setMsg(G.ps[MY_IDX].name+'のターンです。');
  } else {
    setMsg(G.ps[G.cur].name+'のターンです…');
  }
}

/* ===== リモートアクション適用 ===== */
function applyRemoteAction(data, timestamp){
  /* 他プレイヤーのアクションをローカルに反映 */
  if(data.type==='draw_deck'){
    var c=G.deck.pop();
    G.ps[data.playerIdx].hand.push(c);
    G.phase='play';
  }
  else if(data.type==='draw_disc'){
    var c=G.disc.pop();
    G.ps[data.playerIdx].hand.push(c);
    G.phase='play';
  }
  else if(data.type==='play_new'){
    var p=G.ps[data.playerIdx];
    var cards=data.cardIds.map(function(id){
      var i=p.hand.findIndex(function(c){return c.id===id;});
      var c=p.hand[i];p.hand.splice(i,1);return c;
    });
    var nj=cards.filter(function(c){return !c.joker;});
    if(nj.every(function(c){return c.val===nj[0].val;})){G.sameField.push({cards:cards});}
    else{var s=nj[0].suit;if(!G.seqField[s])G.seqField[s]=[];cards.forEach(function(c){G.seqField[s].push(c);});}
  }
  else if(data.type==='add_to_field'){
    var p=G.ps[data.playerIdx];
    var ci=p.hand.findIndex(function(c){return c.id===data.cardId;});
    var card=p.hand[ci];p.hand.splice(ci,1);
    if(data.targetType==='seq'){G.seqField[data.suit].push(card);}
    else{G.sameField[data.meldIdx].cards.push(card);}
  }
  else if(data.type==='swap_joker'){
    var p=G.ps[data.playerIdx];
    var ci=p.hand.findIndex(function(c){return c.id===data.cardId;});
    var card=p.hand[ci];p.hand.splice(ci,1);
    var jk;
    if(data.targetType==='same'){
      var meld=G.sameField[data.meldIdx];
      var ji=meld.cards.findIndex(function(c){return c.joker;});
      jk=meld.cards[ji];meld.cards[ji]=card;
    } else {
      var sm=G.seqField[data.suit];
      var ji=sm.findIndex(function(c){return c.joker;});
      jk=sm[ji];sm[ji]=card;
    }
    p.hand.push(jk);
  }
  else if(data.type==='discard'){
    var p=G.ps[data.playerIdx];
    var ci=p.hand.findIndex(function(c){return c.id===data.cardId;});
    var card=p.hand[ci];p.hand.splice(ci,1);
    G.disc.push(card);
    G.firstDiscard=true;
    endTurn();
  }
  else if(data.type==='stop'){
    resolveStop(data.ok,data.mul);
  }
  else if(data.type==='win_out'){
    var winner=G.ps[data.playerIdx];
    var mul=G.flowMul;G.flowMul=1;
    winner.score+=mul;
    G.ps.forEach(function(p){if(p!==winner&&p.active)p.score-=mul;});
    showRoundResult('out',mul,winner);
  }
  renderAll();
}

/* ===== JKポン先着判定 ===== */
function showConnecting(msg){
  document.getElementById('host-area').style.display='none';
  document.getElementById('join-area').style.display='none';
  document.getElementById('connecting-area').style.display='block';
  document.getElementById('waiting-area').style.display='none';
  setConnectMsg(msg);
}
function setConnectMsg(msg){
  var el=document.getElementById('connect-msg');
  if(el)el.textContent=msg;
}
function showWaiting(){
  document.getElementById('host-area').style.display='none';
  document.getElementById('join-area').style.display='none';
  document.getElementById('connecting-area').style.display='none';
  document.getElementById('waiting-area').style.display='block';
  document.getElementById('room-code-display').textContent=ROOM_CODE;
  updateWaitingUI();
}
function updateWaitingUI(){
  var list=document.getElementById('player-list');
  if(!list)return;
  var h='';
  PLAYERS.forEach(function(p,i){
    var col=['var(--p1)','var(--p2)','var(--p3)','var(--p4)'][i]||'var(--txt)';
    h+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--brd)">'+
       '<div style="width:8px;height:8px;border-radius:50%;background:'+col+'"></div>'+
       '<div style="font-size:13px;color:var(--txt)">'+p.name+'</div>'+
       (p.connected?'<div style="font-size:10px;color:#1D9E75;margin-left:auto">接続中</div>':'<div style="font-size:10px;color:#D85A30;margin-left:auto">切断</div>')+
       '</div>';
  });
  list.innerHTML=h;
  /* 全員揃ったらホストにスタートボタン表示 */
  var startBtn=document.getElementById('start-btn');
  var waitMsg=document.getElementById('wait-players-msg');
  if(IS_HOST&&PLAYERS.filter(function(p){return p.connected;}).length>=NUM_PLAYERS){
    if(startBtn)startBtn.style.display='block';
    if(waitMsg)waitMsg.style.display='none';
  } else {
    if(startBtn)startBtn.style.display='none';
    if(waitMsg){
      var cnt=PLAYERS.filter(function(p){return p.connected;}).length;
      waitMsg.textContent=cnt+'/'+NUM_PLAYERS+'人参加中…';
    }
  }
}

    if(btn)btn.className='setup-num-btn'+(x===n?' active':'');

function startGame(){
  var n=NUM_PLAYERS;
  var p1=document.getElementById('inp-p1').value||'P1';
  var names;
  if(n===2){
    /* 2人：P1(下)・P3(上) → 内部インデックス0,2 */
    var p3=document.getElementById('inp-p3').value||'P2';
    names=[p1,'','p3',''];
    names=[
      {name:p1,hand:[],score:0,idx:0,active:true},
      {name:'',hand:[],score:0,idx:1,active:false},
      {name:p3,hand:[],score:0,idx:2,active:true},
      {name:'',hand:[],score:0,idx:3,active:false}
    ];
  } else if(n===3){
    /* 3人：P1(下)・P2(左)・P3(上) */
    var p2=document.getElementById('inp-p2').value||'P2';
    var p3=document.getElementById('inp-p3').value||'P3';
    names=[
      {name:p1,hand:[],score:0,idx:0,active:true},
      {name:p2,hand:[],score:0,idx:1,active:true},
      {name:p3,hand:[],score:0,idx:2,active:true},
      {name:'',hand:[],score:0,idx:3,active:false}
    ];
  } else {
    /* 4人：全員 */
    var p2=document.getElementById('inp-p2').value||'P2';
    var p3=document.getElementById('inp-p3').value||'P3';
    var p4=document.getElementById('inp-p4').value||'P4';
    names=[
      {name:p1,hand:[],score:0,idx:0,active:true},
      {name:p2,hand:[],score:0,idx:1,active:true},
      {name:p3,hand:[],score:0,idx:2,active:true},
      {name:p4,hand:[],score:0,idx:3,active:true}
    ];
  }
  G={ps:names,
     deck:[],disc:[],seqField:{},sameField:[],
     cur:0,parent:0,round:1,maxR:10,phase:'draw',sel:[],
     drawnCard:null,flowMul:1,firstDiscard:false,ti:0,
     numPlayers:n};
  /* アクティブプレイヤーのみでターン順を組む */
  G.activePsIdx=G.ps.reduce(function(arr,p,i){if(p.active)arr.push(i);return arr;},[]);
  G.curActivePos=0;G.cur=G.activePsIdx[0];G.parent=G.activePsIdx[0];
  /* UIレイアウト切り替え */
  applyLayout(n);
  document.getElementById('setup-scr').classList.add('hidden');

}

function applyLayout(n){
  var p2area=document.getElementById('p2-area');
  var p4area=document.getElementById('p4-area');
  if(!p2area||!p4area)return;
  if(n===2){
    p2area.style.display='none';
    p4area.style.display='none';
  } else if(n===3){
    p2area.style.display='';
    p4area.style.display='none';
  } else {
    p2area.style.display='';
    p4area.style.display='';
  }
}

function setNextParent(type,winnerIdx,stopperIdx){
  var isParent=function(idx){return idx===G.parent;};
  if(type==='out'){if(isParent(winnerIdx))return G.parent;return nextParentIdx();}
  if(type==='stop_ok'){if(isParent(stopperIdx))return G.parent;return nextParentIdx();}
  if(type==='stop_ng'){if(isParent(stopperIdx))return nextParentIdx();return G.parent;}
  return nextParentIdx();
}
function nextParentIdx(){
  var pos=(G.activePsIdx.indexOf(G.parent)+1)%G.activePsIdx.length;
  return G.activePsIdx[pos];
}
function dealRoundWithSeed(seed){
  G.deck=seededShuffle(makeDeck(),seed);
  G.disc=[];G.seqField={};G.sameField=[];
  G.sel=[];G.phase='draw';G.ti=0;G.firstDiscard=false;G.drawnCard=null;
  G.ps.forEach(function(p){p.hand=[];});
  for(var i=0;i<7;i++)G.ps.forEach(function(p){if(p.active)p.hand.push(G.deck.pop());});
  G.disc.push(G.deck.pop());
  G.curActivePos=G.activePsIdx.indexOf(G.parent);
  G.cur=G.parent;
  applyLayout(G.numPlayers);
  renderAll();
  if(G.cur===MY_IDX)setMsg(G.ps[MY_IDX].name+'のターンです。');
  else setMsg(G.ps[G.cur].name+'のターンです…');
}
function dealRound(){
  G.deck=sfl(makeDeck());G.disc=[];G.seqField={};G.sameField=[];
  G.sel=[];G.phase='draw';G.ti=0;G.firstDiscard=false;G.drawnCard=null;
  G.ps.forEach(function(p){p.hand=[];});
  for(var i=0;i<7;i++)G.ps.forEach(function(p){if(p.active)p.hand.push(G.deck.pop());});
  G.disc.push(G.deck.pop());
  G.curActivePos=G.activePsIdx.indexOf(G.parent);
  G.cur=G.parent;
  applyLayout(G.numPlayers);
  renderAll();setMsg(G.ps[G.cur].name+'\u306e\u30bf\u30fc\u30f3\u3067\u3059\u3002');
  if(G.cur!==0)setTimeout(cpuTurn,900);
}

function toggleSel(id){
  var i=G.sel.indexOf(id);
  if(i>=0)G.sel.splice(i,1);else G.sel.push(id);
  renderHand();renderActions();
}
function getSel(){
  var arr=G.ps[MY_IDX].hand.filter(function(c){return G.sel.indexOf(c.id)>=0;});
  if(G.drawnCard&&G.sel.indexOf(G.drawnCard.id)>=0)arr.push(G.drawnCard);
  return arr;
}

function drawDeck(){
  if(G.cur!==MY_IDX||G.phase!=='draw')return;
  if(!G.deck.length){handleFlow();return;}
  G.drawnCard=G.deck.pop();G.phase='play';G.sel=[];
  sendAction('draw_deck',{});
  setMsg(cl(G.drawnCard)+'\u3092\u30c4\u30e2\uff01\u6368\u3066\u308b\u304b\u5834\u306b\u51fa\u3057\u3066\u304f\u3060\u3055\u3044\u3002');
  renderAll();
}
function drawDisc(){
  if(G.cur!==MY_IDX||G.phase!=='draw')return;
  if(!G.disc.length){setMsg('\u6368\u3066\u672d\u304c\u3042\u308a\u307e\u305b\u3093\u3002');return;}
  G.drawnCard=G.disc.pop();G.phase='play';G.sel=[];
  sendAction('draw_disc',{});
  setMsg(cl(G.drawnCard)+'\u3092\u53d6\u308a\u307e\u3057\u305f\uff01');
  renderAll();
}

function doPlayNew(){
  var sel=getSel();
  if(sel.length<3){setMsg('3\u679a\u4ee5\u4e0a\u9078\u3093\u3067\u304f\u3060\u3055\u3044\u3002');return;}
  if(!valMeld(sel)){setMsg('\u51fa\u305b\u306a\u3044\u7d44\u307f\u5408\u308f\u305b\u3067\u3059\u3002');return;}
  var p=G.ps[MY_IDX];
  sel.forEach(function(c){
    if(G.drawnCard&&G.drawnCard.id===c.id)G.drawnCard=null;
    else{var i=p.hand.indexOf(c);if(i>=0)p.hand.splice(i,1);}
  });
  if(G.drawnCard){p.hand.push(G.drawnCard);G.drawnCard=null;}
  var nj=sel.filter(function(c){return !c.joker;});
  if(!nj.length){setMsg('JKのみでは場に出せません。');return;}
  if(nj.every(function(c){return c.val===nj[0].val;})){
    G.sameField.push({cards:sel.slice()});
  } else {
    var suit=nj[0].suit;
    if(!G.seqField[suit])G.seqField[suit]=[];
    sel.forEach(function(c){G.seqField[suit].push(c);});
  }
  G.sel=[];
  if(!p.hand.length&&!G.drawnCard){winOut(p);return;}
  broadcastGameState();
  setMsg('\u5834\u306b\u51fa\u3057\u307e\u3057\u305f\u30011\u679a\u6368\u3066\u3066\u304f\u3060\u3055\u3044\u3002');renderAll();
}

function doAddToField(forceSuit,forceMeldIdx,forceAsVal){
  var sel=getSel();
  if(sel.length!==1){setMsg('1枚選んでください。');return;}
  var card=sel[0];
  var target;
  if(forceSuit!==undefined&&forceSuit!==null){
    target={type:'seq',suit:forceSuit,asVal:forceAsVal};
  } else if(forceMeldIdx!==undefined&&forceMeldIdx!==null){
    target={type:'same',meldIdx:forceMeldIdx};
  } else {
    target=canAddToField(card);
  }
  if(!target){setMsg('追加できません。');return;}
  /* 複数候補がある場合は選択ボタンを表示 */
  if(target.type==='multi'){
    var btns='<div style="font-size:10px;color:var(--txt2);margin-bottom:3px">JKをどこに追加？</div><div style="display:flex;flex-wrap:wrap;gap:4px">';
    target.candidates.forEach(function(c){
      if(c.type==='seq'){
        btns+='<button class="act-btn" style="background:#1a5a8a;color:white;flex:none;padding:5px 8px;font-size:11px" onclick="doAddToField(\''+c.suit+'\',null,'+c.asVal+')">'+c.label+'</button>';
      } else {
        btns+='<button class="act-btn" style="background:#2a5a3a;color:white;flex:none;padding:5px 8px;font-size:11px" onclick="doAddToField(null,'+c.meldIdx+',null)">'+c.label+'</button>';
      }
    });
    btns+='</div>';
    document.getElementById('act-bar').innerHTML=btns;
    return;
  }
  /* 追加実行 */
  var p=G.ps[MY_IDX];var fromDrawn=G.drawnCard&&G.drawnCard.id===card.id;
  if(fromDrawn){G.drawnCard=null;}
  else{p.hand.splice(p.hand.indexOf(card),1);if(G.drawnCard){p.hand.push(G.drawnCard);G.drawnCard=null;}}
  if(target.type==='seq'){
    G.seqField[target.suit].push(card);
  } else {
    G.sameField[target.meldIdx].cards.push(card);
  }
  G.sel=[];
  if(!p.hand.length){winOut(p);return;}
  broadcastGameState();
  setMsg('追加しました、1枚捨ててください。');renderAll();
}

function doSwapJoker(){
  var sel=getSel();
  if(sel.length!==1){setMsg('1\u679a\u9078\u3093\u3067\u304f\u3060\u3055\u3044\u3002');return;}
  var card=sel[0];var target=canSwapJokerInField(card);
  if(!target){setMsg('\u4ea4\u63db\u3067\u304d\u307e\u305b\u3093\u3002');return;}
  var p=G.ps[MY_IDX];var jk;
  if(target.type==='same'){
    var meld=G.sameField[target.meldIdx];
    var ji=meld.cards.findIndex(function(c){return c.joker;});
    jk=meld.cards[ji];meld.cards[ji]=card;
  } else {
    var sm=G.seqField[target.suit];
    var ji2=sm.findIndex(function(c){return c.joker;});
    jk=sm[ji2];sm[ji2]=card;
  }
  var fromDrawn=G.drawnCard&&G.drawnCard.id===card.id;
  if(fromDrawn){G.drawnCard=null;}
  else{p.hand.splice(p.hand.indexOf(card),1);if(G.drawnCard){p.hand.push(G.drawnCard);G.drawnCard=null;}}
  p.hand.push(jk);
  G.sel=[];
  if(!p.hand.length){winOut(p);return;}
  broadcastGameState();
  setMsg('JKと交換しました、1枚捨ててください。');renderAll();
}

function doDiscard(){
  var sel=getSel();var p=G.ps[MY_IDX];
  if(sel.length!==1){setMsg('\u6368\u3066\u308b\u30ab\u30fc\u30c9\u30921\u679a\u9078\u3093\u3067\u304f\u3060\u3055\u3044\u3002');return;}
  var card=sel[0];
  if(card.joker){setMsg('\u30b8\u30e7\u30fc\u30ab\u30fc\u306f\u6368\u3066\u3089\u308c\u307e\u305b\u3093\u3002');return;}
  var fromDrawn=G.drawnCard&&G.drawnCard.id===card.id;
  if(fromDrawn){G.drawnCard=null;}
  else{p.hand.splice(p.hand.indexOf(card),1);if(G.drawnCard){p.hand.push(G.drawnCard);G.drawnCard=null;}}
  G.disc.push(card);G.sel=[];G.firstDiscard=true;
  sendAction('discard',{cardId:card.id});
  if(!p.hand.length){winOut(p);return;}
  /* 捕て後にゲーム状態を全員に配信 */
  endTurn();
}

function getSeqRange(sm){
  /* 連番フィールドの実際の値範囲を返す（JKの穴も含む） */
  var nj=sm.filter(function(c){return !c.joker;});
  var vals=nj.map(function(c){return c.val;}).sort(function(a,b){return a-b;});
  /* JKが穴を埋めている場合を考慮して最小・最大を返す */
  var jv=findJokerVal(sm);
  var allVals=vals.slice();
  if(jv)allVals.push(jv.val);
  allVals.sort(function(a,b){return a-b;});
  return{min:allVals[0],max:allVals[allVals.length-1]};
}
function canAddToField(card){
  if(card.joker){
    /* JK: 連番の両端候補・同番4枚未満を全部返す */
    var candidates=[];
    Object.keys(G.seqField).forEach(function(s){
      var sm=G.seqField[s];if(!sm.length)return;
      var r=getSeqRange(sm);
      if(r.min>1)candidates.push({type:'seq',suit:s,asVal:r.min-1,label:s+vn(r.min-1)+'の代わり（左端）'});
      if(r.max<13)candidates.push({type:'seq',suit:s,asVal:r.max+1,label:s+vn(r.max+1)+'の代わり（右端）'});
    });
    G.sameField.forEach(function(meld,mi){
      if(meld.cards.length<4){
        var nj=meld.cards.filter(function(c){return !c.joker;});
        var lbl=nj.length?'同番'+vn(nj[0].val)+'に追加':'JK組に追加';
        candidates.push({type:'same',meldIdx:mi,label:lbl});
      }
    });
    if(!candidates.length)return null;
    if(candidates.length===1)return candidates[0];
    return{type:'multi',candidates:candidates};
  }
  /* 通常カード: 連番の端に追加 */
  var sm=G.seqField[card.suit];
  if(sm&&sm.length){
    var r=getSeqRange(sm);
    if(card.val===r.min-1)return{type:'seq',suit:card.suit,asVal:card.val};
    if(card.val===r.max+1)return{type:'seq',suit:card.suit,asVal:card.val};
  }
  /* 通常カード: 同番4枚未満に追加 */
  for(var mi=0;mi<G.sameField.length;mi++){
    var meld=G.sameField[mi];
    var mnj=meld.cards.filter(function(c){return !c.joker;});
    if(mnj.length&&mnj[0].val===card.val&&meld.cards.length<4)return{type:'same',meldIdx:mi};
  }
  return null;
}
function canSwapJokerInField(card){
  if(card.joker)return null;
  for(var mi=0;mi<G.sameField.length;mi++){
    var meld=G.sameField[mi];
    if(!meld.cards.some(function(c){return c.joker;}))continue;
    var nj=meld.cards.filter(function(c){return !c.joker;});
    if(nj.length&&nj[0].val===card.val)return{type:'same',meldIdx:mi};
  }
  var suits=Object.keys(G.seqField);
  for(var si=0;si<suits.length;si++){
    var s=suits[si];var sm=G.seqField[s];
    if(!sm.some(function(c){return c.joker;}))continue;
    var jv=findJokerVal(sm);
    if(jv&&card.suit===s&&card.val===jv.val)return{type:'seq',suit:s};
  }
  return null;
}

function findJokerVal(meld){
  /* 場のJKが何の代わりか返す */
  var nj=meld.filter(function(c){return !c.joker;});
  if(!nj.length)return null;
  /* 同数の組：JKはその数字の代わり */
  if(nj.every(function(c){return c.val===nj[0].val;}))return{suit:null,val:nj[0].val};
  /* 連番の組：穴を探す */
  var suit=nj[0].suit;
  var vals=nj.map(function(c){return c.val;}).sort(function(a,b){return a-b;});
  /* 穴がある場合（JKが中間） */
  for(var i=0;i<vals.length-1;i++){if(vals[i+1]-vals[i]===2)return{suit:suit,val:vals[i]+1};}
  /* 穴がない場合：JKが端にある → swap対象はないのでnullを返す */
  /* ただし getSeqRange では端として扱うため null でよい */
  return null;
}
function isJokerTrapped(p){
  if(!p.hand.length)return false;
  if(!p.hand.every(function(c){return c.joker;}))return false;
  return !canAddToField(p.hand[0]);
}
function checkJokerTrap(pidx){
  var p=G.ps[pidx];
  if(!isJokerTrapped(p))return false;
  var others=G.ps.filter(function(q){return q!==p&&q.active;});
  p.score-=4;
  others.forEach(function(q){q.score+=Math.round(4/others.length);});
  showRoundResult('trap',4,p);
  return true;
}
function endTurn(){
  G.phase='draw';G.sel=[];G.drawnCard=null;G.ti++;
  G.curActivePos=(G.curActivePos+1)%G.activePsIdx.length;
  G.cur=G.activePsIdx[G.curActivePos];
  broadcastGameState();
  renderAll();
  if(checkJokerTrap(G.cur))return;
  if(G.cur===MY_IDX){
    setMsg(G.ps[MY_IDX].name+'\u306e\u30bf\u30fc\u30f3\u3067\u3059\u3002');
  } else {
    setMsg(G.ps[G.cur].name+'\u306e\u30bf\u30fc\u30f3\u3067\u3059\u2026');

  }
}

function openStopModal(){
  if(G.cur!==MY_IDX)return;
  var isParentTurn=G.cur===G.parent&&G.ti===0;
  var isParentFirst=isParentTurn&&G.phase==='play';
  /* 親の最初のターンは引いた後(play)のみ、それ以外は引く前(draw)のみ */
  if(isParentTurn&&!isParentFirst)return;
  if(!isParentTurn&&G.phase!=='draw')return;
  var mySum=hsumStop(G.ps[MY_IDX].hand,true);
  document.getElementById('stop-modal-body').innerHTML=
    "<div style='background:#0f0f1e;border-radius:8px;padding:12px;text-align:center'>"+
    "<div style='font-size:11px;color:var(--txt2);margin-bottom:4px'>\u3042\u306a\u305f\u306e\u624b\u672d\u5408\u8a08</div>"+
    "<div style='font-size:28px;font-weight:500;color:var(--p1)'>"+mySum+"\u70b9</div></div>";
  document.getElementById('stop-modal').classList.remove('hidden');
}
function closeStopModal(){document.getElementById('stop-modal').classList.add('hidden');}
function declareStop(){
  closeStopModal();
  var isParent=G.cur===G.parent;
  /* 親の一発：親の最初のターンに1枚引いた後（8枚状態）で宣言 */
  var isParentFirst=isParent&&G.ti===0&&G.phase==='play';
  /* 子の一発：子の最初のターン引く前（7枚状態）で宣言 */
  var isChildFirst=!isParent&&!G.firstDiscard&&G.ti>0&&G.phase==='draw';
  var baseMul=isParentFirst?4:(isChildFirst?2:1);
  var mul=baseMul*G.flowMul; /* 成功・失敗共通の倍率 */
  var me=G.ps[MY_IDX];
  var mySum=hsumStop(me.hand,true);
  var others=G.ps.filter(function(p){return p.idx!==MY_IDX&&p.active;});
  var ok=others.every(function(p){return mySum<=hsumStop(p.hand,false);});
  G.flowMul=1;
  var n=others.length;
  if(ok){
    /* 成功：宣言者+n×mul、相手各-mul */
    me.score+=n*mul;
    others.forEach(function(p){p.score-=mul;});
  } else {
    /* 失敗：宣言者-n×mul×2、相手各+mul×2 */
    me.score-=n*mul*2;
    others.forEach(function(p){p.score+=mul*2;});
  }
  var rtype=ok?'stop_ok':'stop_ng';
  LAST_ROUND_TYPE=rtype;LAST_STOPPER_IDX=MY_IDX;
  if(IS_HOST)G.parent=setNextParent(rtype,-1,MY_IDX);
  sendMsg('round_result',{type:rtype,mul:mul,stopperIdx:MY_IDX,nextParent:G.parent,
    scores:G.ps.map(function(p){return{idx:p.idx,score:p.score};})});
  showRoundResult(rtype,mul);
}

function winOut(winner){
  if(winner.hand.some(function(c){return c.joker;})){
    setMsg('ジョーカーが手札に残っているため上がれません。');
    return;
  }
  var mul=G.flowMul;G.flowMul=1;
  var activeOthers=G.ps.filter(function(p){return p!==winner&&p.active;});
  /* 上がり：勝者は相手人数×mul獲得、相手は各mul失う */
  winner.score+=activeOthers.length*mul;
  activeOthers.forEach(function(p){p.score-=mul;});
  LAST_ROUND_TYPE='out';LAST_WINNER_IDX=winner.idx;
  if(IS_HOST)G.parent=setNextParent('out',winner.idx,-1);
  sendMsg('round_result',{type:'out',mul:mul,winnerIdx:winner.idx,nextParent:G.parent,scores:G.ps.map(function(p){return{idx:p.idx,score:p.score};})});
  showRoundResult('out',mul,winner);
}
function handleFlow(){
  G.flowMul*=2;
  LAST_ROUND_TYPE='flow';
  sendMsg('round_result',{type:'flow',flowMul:G.flowMul,scores:G.ps.map(function(p){return{idx:p.idx,score:p.score};})});
  showRoundResult('flow',G.flowMul);
}

function showRoundResult(type,mul,winner){
  var t=type==='out'?'\ud83c\udf89 '+(winner?winner.name:'')+'\u304c\u4e0a\u304c\u308a\uff01':
        type==='stop_ok'?'\u2713 \u30b9\u30c8\u30c3\u30d7\u6210\u529f\uff01 \xd7'+mul+'\u500d':
        type==='trap'?'JK詰み！満貫 -4pt '+(winner?winner.name:'')+'!':
        type==='stop_ng'?'\u2717 \u30b9\u30c8\u30c3\u30d7\u5931\u6557\u2026 \xd7'+(mul*2)+'\u500d':
        '\u6d41\u308c\uff01\u6b21\u306f\xd7'+G.flowMul+'\u500d';
  document.getElementById('result-title').textContent=t;
  var sorted=G.ps.filter(function(p){return p.active;}).sort(function(a,b){return b.score-a.score;});
  var h="<div style='margin-top:10px'>";
  sorted.forEach(function(p,i){
    h+="<div class='score-row'><span>"+p.name+(i===0?' \ud83c\udff5':'')+"</span>"+
       "<span style='color:"+PCSS[p.idx]+"'>"+p.score+"pt</span></div>";
  });
  document.getElementById('result-body').innerHTML=h+'</div>';
  document.getElementById('result-next-btn').textContent=G.round>=G.maxR?'\u6700\u7d42\u7d50\u679c\u3078':'\u6b21\u306e\u30e9\u30a6\u30f3\u30c9\u3078';
  document.getElementById('result-modal').classList.remove('hidden');
}
function nextRound(){
  document.getElementById('result-modal').classList.add('hidden');
  if(G.round>=G.maxR){showEndResult();return;}
  G.round++;
  if(LAST_ROUND_TYPE==='flow'){
    if(IS_HOST)startParentDraw();
    else document.getElementById('parent-draw-modal').classList.remove('hidden');
    return;
  }
  if(IS_HOST){
    var seed=Math.floor(Math.random()*1000000);
    sendMsg('next_round',{round:G.round,parent:G.parent,seed:seed});
    dealRoundWithSeed(seed);
  }
}

function showEndResult(){

  });

}

function cpuTurn(){
  var cpu=G.ps[G.cur];
  var mySum=hsumStop(cpu.hand,true);
  if(mySum<=7&&G.ti>0){
    var ok=G.ps.filter(function(p){return p!==cpu&&p.active;}).every(function(p){return mySum<=hsumStop(p.hand,false);});
    if(ok||mySum<=3){cpuStop(cpu);return;}
  }
  if(!G.deck.length){handleFlow();return;}
  var drawn=G.deck.pop();cpu.hand.push(drawn);
  var melds=findMelds(cpu.hand);
  if(melds.length){
    var best=melds[0];
    best.forEach(function(c){cpu.hand.splice(cpu.hand.indexOf(c),1);});
    var nj=best.filter(function(c){return !c.joker;});
    if(nj.length&&nj.every(function(c){return c.val===nj[0].val;})){G.sameField.push({cards:best.slice()});}
    else{var s=nj[0].suit;if(!G.seqField[s])G.seqField[s]=[];best.forEach(function(c){G.seqField[s].push(c);});}
  }
  if(!cpu.hand.length){winOut(cpu);return;}
  var td=cpu.hand.filter(function(c){return !c.joker;}).sort(function(a,b){return b.val-a.val;})[0];
  if(td){cpu.hand.splice(cpu.hand.indexOf(td),1);G.disc.push(td);G.firstDiscard=true;}
  if(!cpu.hand.length){winOut(cpu);return;}
  renderAll();endTurn();
}
function cpuStop(cpu){
  var isParent=G.cur===G.parent;
  /* 親の一発：親の最初のターンに1枚引いた後（8枚状態）で宣言 */
  var isParentFirst=isParent&&G.ti===0&&G.phase==='play';
  /* 子の一発：子の最初のターン引く前（7枚状態）で宣言 */
  var isChildFirst=!isParent&&!G.firstDiscard&&G.ti>0&&G.phase==='draw';
  var baseMul=isParentFirst?4:(isChildFirst?2:1);
  var mul=baseMul*G.flowMul;G.flowMul=1;
  var mySum=hsumStop(cpu.hand,true);
  var others=G.ps.filter(function(p){return p!==cpu&&p.active;});
  var ok=others.every(function(p){return mySum<=hsumStop(p.hand,false);});
  var n2=others.length;
  if(ok){
    cpu.score+=n2*mul;
    others.forEach(function(p){p.score-=mul;});
  } else {
    cpu.score-=n2*mul*2;
    others.forEach(function(p){p.score+=mul*2;});
  }
  renderAll();showRoundResult(ok?'stop_ok':'stop_ng',mul);
}

function valMeld(cards){
  var nj=cards.filter(function(c){return !c.joker;});
  var jk=cards.filter(function(c){return c.joker;});
  if(jk.length>1)return false;
  /* JK1枚あり：同数2枚+JKのみ可（連番+JKは不可） */
  if(jk.length===1){
    if(nj.length<2)return false;
    return nj.every(function(c){return c.val===nj[0].val;});
  }
  /* JKなし：同数3枚以上 or 同絵柄連番3枚以上 */
  if(cards.every(function(c){return c.val===cards[0].val;}))return true;
  if(cards.length>=3&&cards.every(function(c){return c.suit===cards[0].suit;})){
    var v=cards.map(function(c){return c.val;}).sort(function(a,b){return a-b;});
    if(v.every(function(x,i){return i===0||x===v[i-1]+1;}))return true;
    /* K→Aのつなぎ有効（例：Q,K,A） */
    if(v[0]===1&&v[v.length-1]===13){
      var v2=v.slice(1).concat([14]).sort(function(a,b){return a-b;});
      if(v2.every(function(x,i){return i===0||x===v2[i-1]+1;}))return true;
    }
  }
  return false;
}
function findMelds(hand){
  var res=[];var nj=hand.filter(function(c){return !c.joker;});var jk=hand.filter(function(c){return c.joker;});
  var byV={};nj.forEach(function(c){if(!byV[c.val])byV[c.val]=[];byV[c.val].push(c);});
  Object.keys(byV).forEach(function(v){var arr=byV[v];
    if(arr.length>=3)res.push(arr.slice());
    else if(arr.length===2&&jk.length)res.push(arr.concat([jk[0]]));
  });
  SUITS.forEach(function(s){
    var sv=nj.filter(function(c){return c.suit===s;}).sort(function(a,b){return a.val-b.val;});
    for(var i=0;i<sv.length;i++){
      var seq=[sv[i]];
      for(var j=i+1;j<sv.length;j++){if(sv[j].val===seq[seq.length-1].val+1)seq.push(sv[j]);else break;}
      if(seq.length>=3)res.push(seq.slice());
    }
  });
  return res.sort(function(a,b){return b.length-a.length;});
}

function getViewIdx(){
  /* 自分(MY_IDX)を基準に他プレイヤーの表示位置を計算 */

    p3: active[(myPos+2)%n],  /* 対面（上） */
    p4: active[(myPos+3)%n]   /* 右隣 */
  };
}

function renderSeqField(){
  var rowIds={};rowIds[SP]='spade';rowIds[HT]='heart';rowIds[DM]='diamond';rowIds[CL]='club';
  SUITS.forEach(function(s){
    var row=document.getElementById('seq-'+rowIds[s]);
    while(row.children.length>1)row.removeChild(row.lastChild);
    var placed=G.seqField[s]||[];
    if(!placed.length){
      /* 空スロット13個 */
      for(var v=1;v<=13;v++){var sl=document.createElement('div');sl.className='seq-slot empty';row.appendChild(sl);}
      return;
    }
    var nj=placed.filter(function(c){return !c.joker;});
    var jkCount=placed.filter(function(c){return c.joker;}).length;
    var red=(s===HT||s===DM);
    /* 実際に置かれているカードのval */
    var pv={};nj.forEach(function(c){pv[c.val]=true;});
    /* JKが穴を埋めている値を計算 */
    var jkVals={};
    if(jkCount>0){
      var allVals=nj.map(function(c){return c.val;}).sort(function(a,b){return a-b;});
      /* 穴（連続でない箇所）を探す */
      var holes=[];
      for(var i=0;i<allVals.length-1;i++){
        if(allVals[i+1]-allVals[i]===2)holes.push(allVals[i]+1);
      }
      /* 穴があればJKが埋めている */
      holes.slice(0,jkCount).forEach(function(v){jkVals[v]=true;});
      /* 穴がない場合はJKが端 */
      if(holes.length===0&&jkCount>0){
        /* 右端か左端にJKがある（getSeqRangeで判断） */
        var r=getSeqRange(placed);
        /* JKの位置は既存カードの外側 */
        if(allVals[0]>1)jkVals[r.min]=true;
        else jkVals[r.max]=true;
      }
    }
    /* 範囲を決定 */
    var r=getSeqRange(placed);
    var minV=r.min,maxV=r.max;
    /* 13スロット表示 */
    for(var v=1;v<=13;v++){
      var slot=document.createElement('div');
      if(pv[v]){slot.className='seq-slot on'+(red?' red':'');slot.textContent=vn(v);}
      else if(jkVals[v]){slot.className='seq-slot on'+(red?' red':'');slot.style.borderColor='#7F77DD';slot.style.color='#9988ff';slot.textContent='JK';}
      else{slot.className='seq-slot empty';}
      row.appendChild(slot);
    }
  });
}
function renderPiles(){
  document.getElementById('deck-cnt').textContent=G.deck.length+'\u679a';
  document.getElementById('disc-cnt').textContent=G.disc.length+'\u679a';
  var disc=document.getElementById('disc-card');
  disc.className='pile-card disc';
  if(G.disc.length){
    var top=G.disc[G.disc.length-1];var red=(top.suit===HT||top.suit===DM);
    disc.innerHTML="<div class='p-suit' style='color:"+(red?'#f08080':'#c8d8d0')+"'>"+top.suit+"</div><div class='p-num'>"+vn(top.val)+'</div>';
    disc.classList.add('disc-glow-p'+((G.cur+3)%4+1));
  } else disc.innerHTML="<div style='font-size:10px;color:var(--txt2)'>\u306a\u3057</div>";
}
function renderSameField(){
  var area=document.getElementById('same-groups');area.innerHTML='';
  G.sameField.forEach(function(meld){
    var nj=meld.cards.filter(function(c){return !c.joker;});
    var lbl=nj.length?vn(nj[0].val)+'\xd7'+meld.cards.length:'JK\u7d44';
    var g=document.createElement('div');g.className='same-group';
    var l=document.createElement('div');l.className='same-group-lbl';l.textContent=lbl;g.appendChild(l);
    var row=document.createElement('div');row.className='same-cards';
    meld.cards.forEach(function(c){
      var d=document.createElement('div');
      d.className='same-card '+(c.joker?'jk':SC[c.suit]);
      d.textContent=c.joker?'\u2605JK':c.suit+vn(c.val);
      row.appendChild(d);
    });
    g.appendChild(row);area.appendChild(g);
  });
}
function renderHand(){
  var p=G.ps[MY_IDX];
  var sorted=p.hand.slice().sort(function(a,b){
    if(a.joker)return 1;if(b.joker)return -1;
    if(a.suit!==b.suit)return SUITS.indexOf(a.suit)-SUITS.indexOf(b.suit);
    return a.val-b.val;
  });
  document.getElementById('p1-name-lbl').textContent=p.name;
  var total=hsum(p.hand)+(G.drawnCard&&!G.drawnCard.joker?G.drawnCard.val:0);
  document.getElementById('p1-stats').textContent=
    p.hand.length+(G.drawnCard?'+1':'')+'\u679a \u5408\u8a08:'+total;
  var area=document.getElementById('p1-hand');area.innerHTML='';
  sorted.forEach(function(c){
    var sel=G.sel.indexOf(c.id)>=0;
    var el=document.createElement('div');
    el.className='hand-card '+(c.joker?'jok':SC[c.suit])+(sel?' sel':'');
    el.innerHTML="<span class='h-suit'>"+(c.joker?'\u2605':c.suit)+"</span><span class='h-num'>"+(c.joker?'JK':vn(c.val))+'</span>';
    (function(card){el.onclick=function(){if(G.cur===MY_IDX&&G.phase==='play')toggleSel(card.id);};})(c);
    area.appendChild(el);
  });
  var drawEl=document.getElementById('draw-card');
  if(G.drawnCard&&G.phase==='play'){
    var dc=G.drawnCard;var red=(dc.suit===HT||dc.suit===DM);var sel=G.sel.indexOf(dc.id)>=0;
    drawEl.style.cssText='width:36px;height:52px;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:transform .12s;';
    drawEl.style.background=dc.joker?'#2a2050':'#1e2e28';
    drawEl.style.border=sel?'2px solid #fff':(dc.joker?'1px solid #7F77DD':'1px solid var(--p1)');
    drawEl.style.color=dc.joker?'#9988ff':(red?'#f08080':'#c8d8d0');
    drawEl.style.transform=sel?'translateY(-7px)':'';
    drawEl.style.boxShadow=sel?'0 0 10px rgba(127,255,212,.5)':'0 0 6px rgba(127,255,212,.3)';
    drawEl.innerHTML="<span style='font-size:16px;line-height:1.2'>"+(dc.joker?'\u2605':dc.suit)+"</span><span style='font-size:11px'>"+(dc.joker?'JK':vn(dc.val))+'</span>';
    (function(card){drawEl.onclick=function(){if(G.cur===MY_IDX&&G.phase==='play')toggleSel(card.id);};})(dc);
  } else {
    drawEl.style.cssText='width:36px;height:52px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;background:#3a3060;border:1.5px solid #534AB7;color:#9988ff;font-size:22px;';
    drawEl.innerHTML='\ud83c\udcd0';drawEl.onclick=function(){drawDeck();};
  }
}
function renderActions(){
  var isMine=G.cur===MY_IDX;
  var stopBtn=document.getElementById('stop-btn');
  var actBar=document.getElementById('act-bar');
  /* STOPボタン表示条件 */
  var isParentTurn=G.cur===G.parent&&G.ti===0; /* 親の最初のターン */
  var isParentFirst=isParentTurn&&G.phase==='play'; /* 親一発：引いた後のみ */
  /* 親の最初のターンは引く前(draw)はSTOP不可、引いた後(play)のみ可 */
  var canStop=isMine&&(
    (!isParentTurn&&G.phase==='draw') || /* 通常：引く前OK（親の最初以外） */
    isParentFirst /* 親一発：引いた後のみ */
  );
  if(canStop)stopBtn.classList.remove('hidden');
  else stopBtn.classList.add('hidden');
  if(!isMine||G.phase!=='play'){actBar.classList.add('hidden');return;}
  var sel=getSel();
  if(sel.length===0){actBar.classList.add('hidden');return;}
  actBar.classList.remove('hidden');
  var btns='';
  if(sel.length===1){
    var card=sel[0];
    var at=canAddToField(card);var st=canSwapJokerInField(card);
    if(at)btns+="<button class='act-btn' style='background:#1a5a8a;color:white;flex:1' onclick='doAddToField()'>\u5834\u306b\u8ffd\u52a0</button>";
    if(st)btns+="<button class='act-btn' style='background:#534AB7;color:white;flex:1' onclick='doSwapJoker()'>JK\u3068\u4ea4\u63db</button>";
    if(!card.joker)btns+="<button class='act-btn discard' onclick='doDiscard()'>\u6368\u3066\u308b</button>";
  }
  if(sel.length>=3&&valMeld(sel))
    btns+="<button class='act-btn play' onclick='doPlayNew()'>\u5834\u306b\u51fa\u3059("+sel.length+"\u679a)</button>";
  actBar.innerHTML=btns;
}
function startParentDraw(){
  PARENT_DRAW_CARDS={};
  var seed=Math.floor(Math.random()*1000000);
  PARENT_DRAW_SEED=seed;
  /* ホストが全員分のカードを事前に決めて送信 */
  var allCards={};
  G.activePsIdx.forEach(function(pidx){
    var deck=seededShuffle(makeDeck(),seed+pidx*7777);
    allCards[pidx]=deck[0];
  });
  sendMsg('parent_draw_start',{seed:seed,allCards:allCards});
  /* ホスト自身はカードを隐した状態で表示 */
  PARENT_DRAW_ALL=allCards;
  document.getElementById('parent-draw-modal').classList.remove('hidden');
  var rEl=document.getElementById('parent-draw-result');if(rEl)rEl.textContent='';
  var bEl=document.getElementById('parent-draw-btn-area');if(bEl)bEl.classList.add('hidden');
  renderParentDrawCards();
}
function renderParentDrawCards(){
  var area=document.getElementById('parent-draw-cards');
  if(!area||!G)return;
  area.innerHTML='';
  G.activePsIdx.forEach(function(pidx){
    var card=PARENT_DRAW_CARDS[pidx];
    var div=document.createElement('div');
    div.style.cssText='display:flex;flex-direction:column;align-items:center;gap:4px';
    var nameEl=document.createElement('div');
    nameEl.style.cssText='font-size:10px;color:var(--txt2)';
    nameEl.textContent=G.ps[pidx].name;
    var cardEl=document.createElement('div');
    cardEl.style.cssText='width:48px;height:68px;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:500;';
    if(card){
      var isRed=(card.suit===HT||card.suit===DM);
      cardEl.style.background='#1e2e28';
      cardEl.style.border='1.5px solid var(--p1)';
      cardEl.style.color=card.joker?'#9988ff':(isRed?'#f08080':'#c8d8d0');
      cardEl.innerHTML='<span style="font-size:18px">'+(card.joker?'\u2605':card.suit)+'</span><span>'+(card.joker?'JK':vn(card.val))+'</span>';
    } else {
      cardEl.style.cssText+='background:#3a3060;border:1.5px solid #534AB7;color:#9988ff;font-size:22px;cursor:pointer';
      cardEl.innerHTML='&#127136;';
      if(pidx===MY_IDX)(function(idx){cardEl.onclick=function(){doDrawParentCard(idx);};})(pidx);
    }
    div.appendChild(nameEl);div.appendChild(cardEl);
    area.appendChild(div);
  });
}
function doDrawParentCard(pidx){
  if(PARENT_DRAW_CARDS[pidx])return;
  /* ホストが全員分のカードを事前に決めているので山才から取る */
  var card=PARENT_DRAW_ALL[pidx];
  if(!card)return;
  PARENT_DRAW_CARDS[pidx]=card;
  sendMsg('parent_draw_card',{playerIdx:pidx,card:card});
  checkParentDrawDone();
}
function checkParentDrawDone(){
  renderParentDrawCards();
  if(!G.activePsIdx.every(function(i){return PARENT_DRAW_CARDS[i];}))return;
  var strength=function(c){if(c.joker)return 14;if(c.val===1)return 0;return c.val;};
  var winner=G.activePsIdx.reduce(function(best,idx){
    return strength(PARENT_DRAW_CARDS[idx])>strength(PARENT_DRAW_CARDS[best])?idx:best;
  },G.activePsIdx[0]);
  G.parent=winner;
  var rEl=document.getElementById('parent-draw-result');
  if(rEl)rEl.textContent=G.ps[winner].name+'が親になります！';
  var bEl=document.getElementById('parent-draw-btn-area');
  if(bEl)bEl.classList.remove('hidden');
}
function startNextRoundAfterDraw(){
  document.getElementById('parent-draw-modal').classList.add('hidden');
  if(IS_HOST){
    var seed=Math.floor(Math.random()*1000000);
    sendMsg('next_round',{round:G.round,parent:G.parent,seed:seed});
    dealRoundWithSeed(seed);
  }
}

setNumPlayers(3);
